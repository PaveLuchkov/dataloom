    <title>DataPav</title>
    <!-- Suppress the benign "ResizeObserver loop" warning. This inline script in
         <head> runs before the deferred app module, so the listener registers
         ahead of any overlay handler (the reason it must live here, not in src). -->
    <script>
      window.addEventListener('error', function (e) {
        if (e.message && e.message.indexOf('ResizeObserver loop') !== -1) {
          e.stopImmediatePropagation();
        }
      });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
